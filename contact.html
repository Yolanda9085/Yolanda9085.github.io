<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yolanda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Yolanda Deng</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 class="page-title">Get In Touch</h2>
        
        <div class="contact-wrapper">
            <div class="contact-image-container">
                <!-- 在本地交作业时，请把这里的 src 替换为你自己的图片路径，例如 src="contact-bg.jpg" -->
                <img src="https://images.unsplash.com/photo-1596524430615-b46475ddff6e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Contact Me" class="contact-image">
            </div>

            <!-- 表单提交会通过 mailto: 唤醒邮箱客户端 -->
            <form class="contact-form" action="https://formspree.io/f/xpqbrnqr" method="POST">
                
                <!-- 注意这里：我把内联样式替换成了写在 css 里的辅助类 class="text-center mb-1-5 text-muted" -->
                <p class="text-center mb-1-5 text-muted">
                    You can also find my code repositories at <a href="https://github.com/Yolanda9085" class="repo-link" target="_blank">github.com/Yolanda9085</a>.
                </p>

                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Your Name">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Your Email Address">
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required placeholder="What's on your mind?"></textarea>
                </div>

                <!-- 替换成了 btn-full 辅助类 -->
                <button type="submit" class="btn btn-full">Send Message</button>
                <p class="form-hint">
                </p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Yolanda. Designed and hand-coded from scratch.</p>
    </footer>
</body>
</html>
