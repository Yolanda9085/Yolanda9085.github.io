<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yolanda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-particles" id="particles"></div>

    <header>
        <nav>
            <div class="logo">Yolanda Deng</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="hobbies.html">Hobbies</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 class="page-title">Get In Touch</h2>
        <div class="contact-wrapper">
            <div class="contact-image-container">
                <img src="https://images.unsplash.com/photo-1596524430615-b46475ddff6e?w=600&fit=crop" alt="Contact Me" class="contact-image">
            </div>
            <form class="contact-form" action="https://formspree.io/f/xpqbrnqr" method="POST">
                <p class="text-center mb-1-5 text-muted">
                    You can also find my code repositories at <a href="https://github.com/Yolanda9085" class="repo-link" target="_blank">github.com/Yolanda9085</a>.
                </p>
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Your Email Address">
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required placeholder="What's on your mind?"></textarea>
                </div>
                <button type="submit" class="btn btn-full">Send Message</button>
                <p class="form-hint"></p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Yolanda. Designed and hand-coded from scratch. | <a href="https://github.com/Yolanda9085" target="_blank" style="color:inherit;"><i class="fab fa-github"></i> GitHub</a></p>
    </footer>

    <script>
        (function() {
            var c = document.getElementById('particles');
            if (!c) return;
            var colors = ['#7c3aed','#a78bfa','#c4b5fd','#f59e0b','#fbbf24','#fcd34d'];
            for (var i = 0; i < 25; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var s = Math.random() * 8 + 3;
                p.style.width = s + 'px'; p.style.height = s + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (Math.random() * 6 + 6) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                c.appendChild(p);
            }
        })();
    </script>
</body>
</html>
